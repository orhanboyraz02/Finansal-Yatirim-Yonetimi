    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #0a0f2c 0%, #12173f 100%); min-height: 100vh; margin: 0; padding: 0; }
        .text-gold { color: #f5b042 !important; }
        .bg-gold { background: #f5b042; }
        .btn-gold { background: #f5b042; color: #0a0f2c; font-weight: bold; padding: 10px 24px; border-radius: 12px; cursor: pointer; border: none; display: inline-block; text-align: center; transition: 0.2s; }
        .btn-gold:hover { opacity: 0.9; transform: scale(1.02); }
        .card { background: rgba(18, 23, 63, 0.95); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #1e2556; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #0a0f2c; padding: 20px; border-right: 1px solid #1e2556; overflow-y: auto; z-index: 100; }
        .main { margin-left: 260px; padding: 20px; }
        .menu-item { padding: 12px 15px; margin: 5px 0; border-radius: 12px; cursor: pointer; color: #9ca3af; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .menu-item:hover { background: rgba(245,176,66,0.15); color: #f5b042; }
        .menu-active { background: #f5b042; color: #0a0f2c; }
        .menu-active i, .menu-active span { color: #0a0f2c; }
        input, select { background: #0f1338; border: 1px solid #1e2556; color: white; border-radius: 12px; padding: 10px; width: 100%; margin-bottom: 10px; }
        input:focus, select:focus { outline: none; border-color: #f5b042; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1e2556; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #12173f; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; border: 1px solid #f5b042; }
        .footer { text-align: center; padding: 20px; margin-top: 30px; border-top: 1px solid #1e2556; color: #9ca3af; font-size: 12px; }
        .signal-buy { background: #10b98120; border-left: 4px solid #10b981; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .signal-sell { background: #ef444420; border-left: 4px solid #ef4444; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .signal-hold { background: #6b728020; border-left: 4px solid #f5b042; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .alert-danger { background: #ef444420; border-left: 4px solid #ef4444; padding: 12px; border-radius: 12px; margin-bottom: 12px; }
        .metric-card { text-align: center; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 1rem; }
        .white-text { color: white !important; }
        .text-sm { font-size: 13px; }
        .text-xs { font-size: 11px; }
        h1, h2, h3, h4, .gold-text { color: #f5b042 !important; }
        p, span, td, th, label, .white-text { color: white !important; }
        .text-gray { color: #9ca3af !important; }
    </style>
</head>
<body>

<div id="app"></div>

<script>

        { id: 2, name: "GÜMÜŞ", symbol: "XAGUSD", price: 31.2, change: "+0.8%", rsi: 58, confidence: 74, trend: "↑", volume: 8900 },

        { id: 8, name: "DOĞALGAZ", symbol: "NG", price: 2.85, change: "-1.2%", rsi: 38, confidence: 43, trend: "↓", volume: 8900 },
        { id: 9, name: "EUROBOND", symbol: "EUROBND", price: 1.085, change: "+0.2%", rsi: 52, confidence: 56, trend: "↑", volume: 34500 },
        { id: 10, name: "NASDAQ", symbol: "NDX", price: 18500, change: "+0.7%", rsi: 61, confidence: 73, trend: "↑", volume: 18700 },

        { id: 12, name: "ÇİN 50", symbol: "SSE", price: 3500, change: "+0.9%", rsi: 59, confidence: 66, trend: "↑", volume: 8900 }
    ];
    
    // ============================================================

    // ============================================================
    const plans = [

        { name: "Pro", price: 499, features: ["10 Varlık Takibi", "Teknik Analiz", "AI Tahminleri", "Günlük Rapor"], icon: "fa-chart-line" },
        { name: "Premium", price: 999, features: ["Sınırsız Varlık", "Gerçek Zamanlı Veri", "AI Asistan", "7/24 Destek"], icon: "fa-crown", popular: true },
        { name: "Kurumsal", price: 2499, features: ["Özel API", "Dedike Sunucu", "Sınırsız Kullanıcı", "Öncelikli Destek"], icon: "fa-building" }

    let newsList = [
        { title: "Fed faiz kararını açıkladı: Beklendiği gibi sabit kaldı", sentiment: "positive", score: 72, date: "2025-06-15" },
        { title: "Altın rekor seviyeye yaklaştı, güvenli liman talebi artıyor", sentiment: "positive", score: 85, date: "2025-06-14" },
        { title: "Çin ekonomisi yavaşlıyor, emtia fiyatları baskı altında", sentiment: "negative", score: 35, date: "2025-06-13" },
        { title: "Bitcoin ETF onayı sonrası kurumlar piyasaya giriyor", sentiment: "positive", score: 78, date: "2025-06-12" },
        { title: "Avrupa Merkez Bankası faiz indirim sinyali verdi", sentiment: "positive", score: 68, date: "2025-06-11" }
    ];
    
    let pastSignals = [
        { asset: "ALTIN", signal: "AL", date: "2025-06-10", result: "+3.2%", entry: 3320, exit: 3425 },
        { asset: "BIST", signal: "BEKLE", date: "2025-06-09", result: "0%", entry: 10850, exit: 10850 },
        { asset: "BITCOIN", signal: "SAT", date: "2025-06-08", result: "-1.5%", entry: 69500, exit: 68450 },
        { asset: "GÜMÜŞ", signal: "AL", date: "2025-06-07", result: "+0.8%", entry: 30.8, exit: 31.0 }

    let alerts = [
        { id: 1, type: "warning", title: "Likidite Riski", desc: "Piyasa derinliği azalıyor, volatilite artabilir." },
        { id: 2, type: "danger", title: "Jeopolitik Risk", desc: "Orta Doğu'da gerilim yükseliyor, petrol fiyatları etkilenebilir." },
        { id: 3, type: "info", title: "Merkez Bankası", desc: "Fed faiz kararını bu hafta açıklayacak." }
    ];
    
    let macroData = {

        fedRate: 5.5,
        unemployment: 3.8,
        gdp: 2.1,
        geopoliticalRisk: "Yüksek"
    };
    
    let aiForecast = { hour1: 72, hour4: 68, day1: 76, week1: 64, month1: 58 };
    let portfolioAllocation = { gold: 25, stocks: 20, etf: 15, bonds: 15, cash: 10, crypto: 10, alternative: 5 };
    
    // ============================================================
    // 5. YARDIMCI FONKSİYONLAR
    // ============================================================
    function formatMoney(amount) { return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(amount); }
    function formatUSD(amount) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount); }
    function whatsappLink(text) { window.open(`https://wa.me/905418660202?text=${encodeURIComponent(text)}`, '_blank'); }
    function showToast(msg) { alert(msg); }
    
    // Yapay Zeka Sinyal Üretme (API entegrasyonu hazır)
    function generateSignal(asset) {
        let rsi = asset.rsi || 50;
        let trend = asset.trend;
        // Gerçek API entegrasyonu için bu fonksiyon genişletilebilir
        // Şu anda mock veri ile çalışıyor
        if (rsi < 35) return { action: "AL", confidence: 85, entry: asset.price, stop: asset.price * 0.98, target: asset.price * 1.05, riskReward: "1:2.5", reason: "RSI aşırı satım bölgesinde, teknik toparlanma bekleniyor." };
        if (rsi > 70) return { action: "SAT", confidence: 78, entry: asset.price, stop: asset.price * 1.02, target: asset.price * 0.95, riskReward: "1:2", reason: "RSI aşırı alım bölgesinde, kar realizasyonu gelebilir." };
        if (trend === "↑") return { action: "AL", confidence: 65, entry: asset.price, stop: asset.price * 0.99, target: asset.price * 1.03, riskReward: "1:3", reason: "Yükseliş trendi devam ediyor, momentum güçlü." };
        if (trend === "↓") return { action: "SAT", confidence: 60, entry: asset.price, stop: asset.price * 1.01, target: asset.price * 0.98, riskReward: "1:2", reason: "Düşüş trendi devam ediyor, satış baskısı var." };
        return { action: "BEKLE", confidence: 50, entry: asset.price, stop: null, target: null, riskReward: "-", reason: "Piyasa belirsiz, net sinyal yok." };
    }
    
    function totalPortfolio() { return assets.reduce((s, a) => s + a.price, 0) * 100; }
    function calculateRiskScore() {
        let avgRsi = assets.reduce((s, a) => s + a.rsi, 0) / assets.length;
        if (avgRsi > 70) return { score: 75, level: "Yüksek Risk" };
        if (avgRsi > 60) return { score: 55, level: "Orta Risk" };
        if (avgRsi > 40) return { score: 35, level: "Düşük Risk" };
        return { score: 25, level: "Çok Düşük Risk" };
    }
    
    // ============================================================
    // 6. GİRİŞ / ÇIKIŞ / YÖNETİM
    // ============================================================
    function handleLogin(email, password) {
        let user = users.find(u => u.email === email && u.password === password);
        if (user) {
            currentUser = user;
            isAdmin = user.role === "admin";
            localStorage.setItem("user", JSON.stringify(user));
            render();
            return true;
        }
        return false;
    }
    
    function handleLogout() { currentUser = null; isAdmin = false; localStorage.removeItem("user"); render(); }
    
    function openLoginModal() {
        let email = prompt("E-posta:", "demo@finans.com");
        if (!email) return;
        let password = prompt("Şifre:", "demo123");
        if (handleLogin(email, password)) {
            alert("Giriş başarılı!");
        } else {
            alert("Hatalı giriş! Admin: admin@finans.com / Admin123!");
        }
    }
    
    function addAsset() {
        let name = prompt("Varlık adı:");
        let price = parseFloat(prompt("Fiyat ($):"));
        if (name && price) {
            assets.push({ id: Date.now(), name, symbol: name.slice(0,3).toUpperCase(), price, change: "0%", rsi: 50, confidence: 50, trend: "→", volume: 0 });
            alert("✅ Varlık eklendi!");
            render();
        }
    }
    
    function deleteAsset(id) {
        if (confirm("Silmek istediğinize emin misiniz?")) {
            assets = assets.filter(a => a.id !== id);
            alert("🗑️ Varlık silindi!");
            render();
        }
    }
    
    function openAdminPanel() {
        if (!isAdmin) {
            alert("Yönetici değilsiniz! Admin girişi yapın.");
            return;
        }
        let pass = prompt("Yönetici şifresi:");
        if (pass === "admin123") {
            let action = prompt("1- Varlık Ekle\n2- Varlık Sil\nSeçim:");
            if (action === "1") addAsset();
            else if (action === "2") {
                let list = assets.map((a,i) => `${i+1}- ${a.name}`).join("\n");
                let idx = prompt("Silinecek varlık numarası:\n" + list);
                if (idx && assets[idx-1]) deleteAsset(assets[idx-1].id);
            }
        } else {
            alert("Şifre yanlış!");
        }
    }
    
    function upgradeSubscription(planName) {
        if (currentUser) {
            currentUser.subscription = planName.toLowerCase();
            localStorage.setItem("user", JSON.stringify(currentUser));
            showToast(`✅ Aboneliğiniz ${planName} paketine yükseltildi!`);
            render();
        } else {
            alert("Lütfen önce giriş yapın!");
            openLoginModal();
        }
    }
    
    // ============================================================
    // 7. 13 MODÜL (Tam Çalışır)
    // ============================================================
    
    // MODÜL 1: GENEL BAKIŞ
    function renderOverview() {
        let goldSignal = generateSignal(assets[0]);
        let risk = calculateRiskScore();

                <div class="card" style="text-align: center;">
                    <p class="text-gray">Toplam Portföy</p>
                    <h2 style="color:#f5b042; font-size: 28px;">${formatMoney(totalPortfolio())}</h2>
                    <p style="color:#10b981; font-size:12px;">+%12.4 bu ay</p>
                </div>
                <div class="card" style="text-align: center;">
                    <p class="text-gray">Risk Skoru</p>
                    <h2 style="color:#f5b042; font-size: 28px;">${risk.score}/100</h2>
                    <p style="color:#f5b042;">${risk.level}</p>
                </div>
                <div class="card" style="text-align: center;">
                    <p class="text-gray">AI Sinyal</p>
                    <h2 style="color:#f5b042; font-size: 28px;">${goldSignal.action}</h2>
                    <p style="color:#10b981;">Güven: ${goldSignal.confidence}%</p>
                </div>
                <div class="card" style="text-align: center;">
                    <p class="text-gray">Abonelik</p>
                    <h2 style="color:#f5b042; font-size: 24px;">${currentUser?.subscription?.toUpperCase() || "BASIC"}</h2>
                </div>
            </div>
            <div class="card">
                <h3 style="color:#f5b042; font-weight: bold; margin-bottom: 15px;">📈 Öne Çıkan Varlıklar</h3>
                ${assets.slice(0,6).map(a => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #1e2556;"><span style="color:white;">${a.name}</span><span style="color:#f5b042;">${formatUSD(a.price)}</span><span style="color:${a.change.includes('+') ? '#10b981' : '#ef4444'}">${a.change}</span></div>`).join('')}

                        <tbody>
                            ${assets.map(a => `<tr><td style="color:white;">${a.name}</td><td style="color:white;">${a.symbol}</td><td style="color:#f5b042;">${formatUSD(a.price)}</td><td style="color:${a.change.includes('+') ? '#10b981' : '#ef4444'}">${a.change}</td><td style="color:white;">${a.rsi}</td><td><div style="width:100%; background:#1e2556; border-radius:10px;"><div style="width:${a.confidence}%; background:#f5b042; height:6px; border-radius:10px;"></div></div><span style="color:white;">${a.confidence}%</span></td><td style="color:white;">${(a.volume/1000).toFixed(0)}K</td></tr>`).join('')}

    function renderTechnical() {
        setTimeout(() => { let ctx = document.getElementById('techChart')?.getContext('2d'); if(ctx) new Chart(ctx, { type: 'line', data: { labels: ['1G','2G','3G','4G','5G','6G'], datasets: [{ label: 'ALTIN (XAUUSD)', data: [3300,3320,3340,3360,3350,3365], borderColor: '#f5b042', fill: false }] } }); }, 100);

            <div class="card">

                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:15px;">
                    ${assets.slice(0,4).map(a => `<div style="background:#0f2c44; padding:15px; border-radius:12px; text-align:center;"><p style="font-weight:bold; color:white;">${a.name}</p><p style="color:white;">RSI: ${a.rsi}</p><p style="color:${a.rsi > 70 ? '#ef4444' : (a.rsi < 30 ? '#10b981' : '#f5b042')};">${a.rsi > 70 ? '🔴 Aşırı Alım' : (a.rsi < 30 ? '🟢 Aşırı Satım' : '⚪ Nötr')}</p><p style="font-size:12px; color:#9ca3af;">Momentum: ${a.trend}</p></div>`).join('')}

    // MODÜL 4: AI TAHMİNLERİ
    function renderAIForecast() {

                </div>
            </div>
        `;
    }
    
    // MODÜL 5: AI SİNYALLER
    function renderSignals() {
        let goldSignal = generateSignal(assets[0]);
        let signalClass = goldSignal.action === "AL" ? "signal-buy" : (goldSignal.action === "SAT" ? "signal-sell" : "signal-hold");
        return `
            <div class="card">
                <h3 style="color:#f5b042; font-weight: bold; margin-bottom: 15px;">📢 AI Sinyaller</h3>
                <div class="${signalClass}">
                    <h2 style="font-size:28px; color:white;">${goldSignal.action}</h2>
                    <p style="color:#f5b042;">Güven Skoru: ${goldSignal.confidence}/100</p>
                    <p style="color:white;">${goldSignal.reason}</p>
                    ${goldSignal.action !== "BEKLE" ? `
                        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px;">
